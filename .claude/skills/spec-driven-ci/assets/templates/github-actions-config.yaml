# DevForgeAI CI Configuration
# Generated by spec-driven-ci skill
# Location: devforgeai/config/ci/github-actions.yaml

cost_optimization:
  # Enable prompt caching for repeated context (90% savings on cached tokens)
  enable_prompt_caching: true

  # Use Haiku model for routine operations (60x cheaper than Opus)
  prefer_haiku: true

  # Maximum cost per story in USD (workflows exit if exceeded)
  max_cost_per_story: 0.15

  # Turn limits by story complexity
  max_turns:
    simple: 10       # Simple CRUD stories (1-3 points)
    complex: 20      # Standard implementations (5-8 points)
    architecture: 30 # Major refactoring (13+ points)

workflow:
  # Maximum parallel jobs in matrix builds
  max_parallel_jobs: 5

  # Job timeout in minutes
  timeout_minutes: 30

  # GitHub Actions runner
  runner: ubuntu-latest

installer_testing:
  # Enable installer testing workflow generation
  enabled: false
