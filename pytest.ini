[pytest]
# Pytest configuration for DevForgeAI tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    story_034: Tests for STORY-034 QA Command Refactoring
    story_035: Tests for STORY-035 Internet-Sleuth Framework Compliance
    story_036: Tests for STORY-036 Internet-Sleuth Deep Integration (Phase 2)
    acceptance_criteria: Tests verifying acceptance criteria
    unit: Unit tests
    integration: Integration tests
    edge_case: Edge case scenario tests
    business_rule: Business rule enforcement tests
    nfr: Non-functional requirement tests
    slow: Tests that take >1 second to run
    internet_sleuth: Tests for internet-sleuth agent

# Test output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = -v --strict-markers --tb=short --cov=.claude/agents --cov-report=term --cov-report=html

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8
