id: SEC-003
language: python
severity: CRITICAL
message: |
  Hardcoded secret detected: Credentials/keys embedded in source code.

  This violates OWASP A02:2021 - Cryptographic Failures. Hardcoded secrets are exposed
  in source control, logs, and memory, allowing credential compromise and unauthorized access.

  **Fix:** Load secrets from environment variables or secure vaults:
  ✅ api_key = os.getenv("API_KEY")
  ✅ password = os.environ["DATABASE_PASSWORD"]
  ✅ from azure.keyvault.secrets import SecretClient

  **Do not:**
  ❌ api_key = "sk-abc123xyz789"
  ❌ password = "SuperSecretPassword123"
  ❌ AWS_ACCESS_KEY = "AKIAIOSFODNN7EXAMPLE"

note: |
  **OWASP Reference:** A02:2021 - Cryptographic Failures
  **Detection:** Variable names matching secret patterns with string literal values
  **Patterns:**
    - api_key, api_secret, apikey, access_key, secret_key, secret_token
    - password, passwd, pwd
    - AWS_ACCESS_KEY, AWS_SECRET, AWS_KEY, AWS_TOKEN
    - DATABASE_PASSWORD, DB_PASSWORD, MONGO_PASSWORD
    - JWT_SECRET, JWT_KEY, JWT_TOKEN
    - PRIVATE_KEY, CERTIFICATE_KEY
    - CONNECTION_STRING with Password=

rule:
  any:
    # API key patterns
    - pattern: $VAR = "$SECRET"
      constraints:
        VAR:
          regex: "(?i)(api_key|api_secret|apikey|access_key|secret_key|secret_token)"
        SECRET:
          regex: "[a-zA-Z0-9_\\-]{16,}"
    # Password patterns
    - pattern: $VAR = "$SECRET"
      constraints:
        VAR:
          regex: "(?i)(password|passwd|pwd)"
        SECRET:
          regex: ".{8,}"
    # AWS patterns
    - pattern: $VAR = "$SECRET"
      constraints:
        VAR:
          regex: "(?i)(aws_access_key|aws_secret|aws_key|aws_token)"
        SECRET:
          regex: "[A-Z0-9]{16,}"
    # Connection strings
    - pattern: "$$$Password=$PASSWORD$$$"

fix: |
  Use environment variables or secrets management system:

  # Bad
  API_KEY = "sk-abc123xyz789"
  password = "SuperSecretPassword123"

  # Good
  import os
  API_KEY = os.getenv("API_KEY")
  password = os.environ["DATABASE_PASSWORD"]
