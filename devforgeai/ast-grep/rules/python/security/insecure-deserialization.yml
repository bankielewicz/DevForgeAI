id: SEC-005
language: python
severity: CRITICAL
message: |
  Insecure deserialization detected: Deserialization of untrusted data.

  This violates OWASP A08:2021 - Software and Data Integrity Failures. Unsafe deserialization
  can execute arbitrary code through malicious serialized objects.

  **Fix:** Use safe deserialization with type validation:
  ✅ json.loads(data) with schema validation
  ✅ pickle.loads(data, **{"fix_imports": True}) with restricted loading
  ✅ yaml.safe_load() instead of yaml.load()

  **Do not use:**
  ❌ pickle.loads(user_data)
  ❌ yaml.load(user_data)
  ❌ marshal.loads(user_data)
  ❌ json.loads() without schema validation

note: |
  **OWASP Reference:** A08:2021 - Software and Data Integrity Failures
  **Detection:** Unsafe deserialization functions with untrusted input
  **Risk:** Remote Code Execution (RCE) through malicious objects

rule:
  any:
    # pickle.loads without safe mode
    - pattern: "pickle.loads($$$)"
    # yaml.load without Loader
    - pattern: "yaml.load($$$)"
    # unsafe yaml.load call
    - pattern: "yaml.load($VAR, Loader=Loader)"
    # marshal.loads
    - pattern: "marshal.loads($$$)"
    # dill.loads
    - pattern: "dill.loads($$$)"

fix: |
  Use safe deserialization methods:

  # Bad
  data = pickle.loads(user_input)
  config = yaml.load(user_input)

  # Good
  import json
  data = json.loads(user_input)  # Safe, no code execution

  import yaml
  config = yaml.safe_load(user_input)  # Safe YAML loading

  import pickle
  # If pickle required, validate source first
  if validate_source(source):
      data = pickle.loads(user_input)
