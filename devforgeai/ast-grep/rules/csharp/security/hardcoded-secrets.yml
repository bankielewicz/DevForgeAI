id: SEC-003
language: csharp
severity: CRITICAL
message: |
  Hardcoded secret detected: Credentials/keys embedded in source code.

  This violates OWASP A02:2021 - Cryptographic Failures. Hardcoded secrets in source code
  are exposed in repositories, logs, and memory.

  **Fix:** Use configuration files or Azure Key Vault:
  ✅ IConfiguration["ApiKey"]
  ✅ Environment.GetEnvironmentVariable("API_KEY")
  ✅ SecretClient from Azure.Security.KeyVault.Secrets

  **Do not:**
  ❌ string apiKey = "sk-abc123xyz789";
  ❌ string password = "SuperSecretPassword123";

note: |
  **OWASP Reference:** A02:2021 - Cryptographic Failures
  **Detection:** Variables matching secret patterns with string literals

rule:
  any:
    # API key patterns
    - pattern: $TYPE $VAR = "$SECRET"
      constraints:
        VAR:
          regex: "(?i)(apiKey|api_key|apiSecret|secret_key|accessKey|access_key)"
        SECRET:
          regex: "[a-zA-Z0-9_\\-]{16,}"
    # Password patterns
    - pattern: $TYPE $VAR = "$SECRET"
      constraints:
        VAR:
          regex: "(?i)(password|passwd|pwd)"
        SECRET:
          regex: ".{8,}"
    # Connection string patterns
    - pattern: 'string $VAR = "$$$Password=$$$"'

fix: |
  Use configuration and Key Vault:

  // Bad
  private string apiKey = "sk-abc123xyz789";
  private string password = "SuperSecretPassword123";

  // Good
  private readonly IConfiguration _configuration;
  private string apiKey;

  public MyService(IConfiguration configuration)
  {
      _configuration = configuration;
      apiKey = _configuration["ApiKey"];  // From appsettings.json
      // Or from environment
      apiKey = Environment.GetEnvironmentVariable("API_KEY");
  }
