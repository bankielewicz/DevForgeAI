id: SEC-005
language: csharp
severity: CRITICAL
message: |
  Insecure deserialization detected: BinaryFormatter with untrusted data.

  This violates OWASP A08:2021 - Software and Data Integrity Failures. BinaryFormatter
  is unsafe and officially deprecated by Microsoft. It can execute arbitrary code.

  **Fix:** Use JSON serialization with JsonSerializer:
  ✅ JsonSerializer.Deserialize<T>(jsonString)
  ✅ NewtonsoftJson.JsonConvert.DeserializeObject<T>(jsonString)

  **Do not use:**
  ❌ BinaryFormatter.Deserialize(stream)

note: |
  **OWASP Reference:** A08:2021 - Software and Data Integrity Failures
  **Detection:** BinaryFormatter.Deserialize() calls
  **Risk:** Remote Code Execution (RCE) - Microsoft deprecated BinaryFormatter

rule:
  any:
    # BinaryFormatter.Deserialize
    - pattern: 'BinaryFormatter.Deserialize($$$)'
    - pattern: '$VAR.Deserialize($$$)'
      constraints:
        VAR:
          regex: "BinaryFormatter"

fix: |
  Replace with safe JSON deserialization:

  // Bad - VULNERABLE
  var formatter = new BinaryFormatter();
  object obj = formatter.Deserialize(stream);

  // Good - Use JSON
  using (var stream = new FileStream(filename, FileMode.Open))
  {
      var options = new JsonSerializerOptions { PropertyNameCaseInsensitive = true };
      var obj = await JsonSerializer.DeserializeAsync<MyClass>(stream, options);
  }

  // Or use Newtonsoft JSON
  var obj = JsonConvert.DeserializeObject<MyClass>(jsonString);
