id: SEC-004
language: typescript
severity: CRITICAL
message: |
  Dynamic code execution detected: eval() or Function constructor with user input.

  This violates OWASP A03:2021 - Injection. eval() and new Function() execute arbitrary
  JavaScript, allowing complete application compromise.

  **Fix:** Use safe JSON parsing or expression evaluators:
  ✅ JSON.parse(jsonString)
  ✅ math.evaluate(expression)  // For math only
  ✅ Configuration objects instead of code

  **Never use:**
  ❌ eval(userInput)
  ❌ new Function(userInput)()
  ❌ Function(userInput)()

note: |
  **OWASP Reference:** A03:2021 - Injection (Code Injection)
  **Detection:** eval() and Function constructor with arguments
  **Risk:** Complete application compromise

rule:
  any:
    # eval() calls
    - pattern: "eval($$$)"
    # Function constructor
    - pattern: "new Function($$$)"
    - pattern: "Function($$$)"
    # Function() with return
    - pattern: "new Function($$$)($$$)"

fix: |
  Replace with safe alternatives:

  // Bad - VULNERABLE
  const result = eval(userInput);
  const fn = new Function('x', userInput);

  // Good - Use JSON for data
  const data = JSON.parse(userInput);

  // Good - Use safe expression library
  const { evaluate } = require('mathjs');
  const result = evaluate('2 + 3');

  // Good - Use configuration objects
  const config = {
      action: userInput.action,
      value: userInput.value
  };
  // Dispatch based on config, don't execute code
