id: SEC-003
language: typescript
severity: CRITICAL
message: |
  Hardcoded secret detected: Credentials/keys embedded in source code.

  This violates OWASP A02:2021 - Cryptographic Failures. Hardcoded secrets are exposed
  in source control, deployed to production, and visible in client-side code.

  **Fix:** Use environment variables:
  ✅ const apiKey = process.env.API_KEY;
  ✅ const token = import.meta.env.VITE_API_TOKEN;

  **Do not:**
  ❌ const apiKey = "sk-abc123xyz789";
  ❌ const password = "SuperSecretPassword123";

note: |
  **OWASP Reference:** A02:2021 - Cryptographic Failures
  **Detection:** Variables matching secret patterns with string literals
  **Extra Risk:** Client-side JavaScript exposes secrets to all users

rule:
  any:
    # API key patterns
    - pattern: 'const $VAR = "$SECRET"'
      constraints:
        VAR:
          regex: "(?i)(apiKey|api_key|apiSecret|secret_key|accessKey|access_key)"
        SECRET:
          regex: "[a-zA-Z0-9_\\-]{16,}"
    # let variant
    - pattern: 'let $VAR = "$SECRET"'
      constraints:
        VAR:
          regex: "(?i)(apiKey|api_key|apiSecret|secret_key|accessKey|access_key)"
        SECRET:
          regex: "[a-zA-Z0-9_\\-]{16,}"
    # Password patterns
    - pattern: '$DECL $VAR = "$SECRET"'
      constraints:
        VAR:
          regex: "(?i)(password|passwd|pwd|token)"
        SECRET:
          regex: ".{8,}"

fix: |
  Use environment variables:

  // Bad - EXPOSED
  const apiKey = "sk-abc123xyz789";
  const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";

  // Good - Node.js
  const apiKey = process.env.API_KEY;
  const token = process.env.JWT_TOKEN;

  // Good - Frontend (Vite)
  const apiKey = import.meta.env.VITE_API_KEY;

  // Good - Frontend (.env files)
  // .env file (not in git):
  // VITE_API_KEY=sk-abc123xyz789
  const apiKey = import.meta.env.VITE_API_KEY;
