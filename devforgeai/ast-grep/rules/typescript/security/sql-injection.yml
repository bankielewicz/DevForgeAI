id: SEC-001
language: typescript
severity: CRITICAL
message: |
  SQL injection vulnerability detected: User input in SQL query via template literals.

  This violates OWASP A03:2021 - Injection. SQL queries built with template literals (backticks)
  or string concatenation allow SQL injection.

  **Fix:** Use parameterized queries with prepared statements:
  ✅ db.query("SELECT * FROM users WHERE id = $1", [userId])
  ✅ connection.query("SELECT * FROM users WHERE id = ?", [userId])

  **Do not use:**
  ❌ db.query(`SELECT * FROM users WHERE id = ${userId}`)
  ❌ db.query("SELECT * FROM users WHERE id = " + userId)

note: |
  **OWASP Reference:** A03:2021 - Injection
  **Detection:** Template literals with SQL keywords and variables
  **Expected Accuracy:** ≥95% true positives

rule:
  any:
    # Template literals with SQL keywords
    - pattern: '`$$$SELECT$$$`'
    - pattern: '`$$$INSERT$$$`'
    - pattern: '`$$$UPDATE$$$`'
    - pattern: '`$$$DELETE$$$`'
    # String concatenation
    - pattern: '"$$$SELECT$$$" + $VAR'
    - pattern: '"$$$INSERT$$$" + $VAR'
    - pattern: '"$$$UPDATE$$$" + $VAR'
    - pattern: '"$$$DELETE$$$" + $VAR'

fix: |
  Use parameterized queries:

  // Bad
  const result = db.query(`SELECT * FROM users WHERE id = ${userId}`);

  // Good
  const result = db.query("SELECT * FROM users WHERE id = $1", [userId]);

  // Or with named parameters
  const result = db.query(
      "SELECT * FROM users WHERE id = :id",
      { id: userId }
  );
