# Requirements Schema Definition v1.0
# Purpose: YAML schema for structured requirements that enable cross-session AI consumption
# Reference: EPIC-068 Feature 4, STORY-435
# Status: LOCKED
#
# This schema eliminates hallucination at session boundaries by:
# - Locking all decisions with explicit alternatives
# - Quantifying success criteria with measurable targets
# - Defining explicit scope boundaries with deferral targets
# - Maintaining provenance chain back to brainstorm session

schema_version: "1.0"
schema_name: "DevForgeAI Requirements Schema"
description: >-
  Structured requirements format designed for cross-session AI consumption.
  Every field is unambiguous, rejected alternatives are explicit, and
  decisions are locked. Serves as the sole handoff artifact between
  ideation (Session N) and architecture (Session N+1).

# =============================================================================
# DECISIONS
# =============================================================================
# Locked choices with explicit rejected alternatives
# Each decision closes doors the brainstorm left open
decisions:
  type: array
  description: >-
    Array of locked decisions with rejected alternatives.
    Each decision must have locked: true and at least one rejected alternative.
  required: true
  item_schema:
    id:
      type: string
      description: "Unique identifier matching pattern DR-N (e.g., DR-1, DR-2)"
      pattern: "^DR-\\d+$"
      required: true
    domain:
      type: string
      description: "Domain or area this decision applies to (e.g., authentication, database, architecture)"
      required: true
    decision:
      type: string
      description: >-
        The chosen decision text. MUST NOT contain hedging language
        (no 'should', 'might', 'consider', 'possibly').
      required: true
      validation:
        prohibited_words: ["should", "might", "consider", "possibly"]
    rejected:
      type: array
      description: "List of alternatives that were NOT chosen, with reasons"
      required: true
      min_items: 1
      item_schema:
        option:
          type: string
          description: "The rejected alternative"
          required: true
        reason:
          type: string
          description: "Why this alternative was rejected"
          required: true
    rationale:
      type: string
      description: "Why this choice was made (supporting evidence/reasoning)"
      required: true
    locked:
      type: boolean
      description: "Must be true - decisions are immutable after ideation"
      required: true
      value: true
  example:
    - id: "DR-1"
      domain: "authentication"
      decision: "Use JWT tokens with 15-minute expiry"
      rejected:
        - option: "Session cookies"
          reason: "Not suitable for API-first architecture"
      rationale: "JWT enables stateless auth suitable for microservices"
      locked: true

# =============================================================================
# SCOPE
# =============================================================================
# Explicit boundaries - what's in and what's out (with deferral targets)
scope:
  type: object
  description: >-
    Explicit scope boundaries. Items in 'out' must have deferral_target
    indicating when (if ever) they may be reconsidered.
  required: true
  properties:
    in:
      type: array
      description: "Items explicitly included in scope"
      required: true
      item_type: string
      example:
        - "User registration and login"
        - "Product catalog browsing"
    out:
      type: array
      description: "Items explicitly excluded with deferral target"
      required: true
      item_schema:
        item:
          type: string
          description: "The excluded feature/requirement"
          required: true
        deferral_target:
          type: string
          description: "When to reconsider (e.g., 'Phase 2', 'Post-MVP', 'Never')"
          required: true
      example:
        - item: "Payment processing"
          deferral_target: "Phase 2"
        - item: "Social media integration"
          deferral_target: "Never"

# =============================================================================
# SUCCESS CRITERIA
# =============================================================================
# Quantified, measurable criteria - no vague targets allowed
success_criteria:
  type: array
  description: >-
    Quantified success criteria with measurable targets.
    Each target MUST contain numbers or comparators (>, <, %, ms, etc.).
  required: true
  item_schema:
    id:
      type: string
      description: "Unique identifier matching pattern SC-N (e.g., SC-1)"
      pattern: "^SC-\\d+$"
      required: true
    metric:
      type: string
      description: "What is being measured"
      required: true
    target:
      type: string
      description: "Quantified threshold (must contain numbers or comparators)"
      required: true
      validation:
        must_contain_quantifier: true
        example_patterns: ["> 85%", "< 200ms", "99.9%", "≤ 500"]
    measurement:
      type: string
      description: "How this will be verified/measured"
      required: true
  example:
    - id: "SC-1"
      metric: "User registration completion rate"
      target: "> 85%"
      measurement: "Analytics funnel tracking"

# =============================================================================
# CONSTRAINTS
# =============================================================================
# Technical, business, and regulatory constraints
constraints:
  type: array
  description: "Technical, business, or regulatory constraints that must be followed"
  required: true
  item_schema:
    type:
      type: string
      description: "Constraint category (technical, business, regulatory, resource)"
      required: true
      enum: ["technical", "business", "regulatory", "resource"]
    constraint:
      type: string
      description: "The constraint statement"
      required: true
    source:
      type: string
      description: "Source or reference for this constraint"
      required: false
  example:
    - type: "technical"
      constraint: "Must use PostgreSQL per tech-stack.md"
      source: "devforgeai/specs/context/tech-stack.md"

# =============================================================================
# NON-FUNCTIONAL REQUIREMENTS (NFRs)
# =============================================================================
# Performance, security, scalability, reliability requirements
nfrs:
  type: array
  description: "Non-functional requirements covering quality attributes"
  required: true
  item_schema:
    category:
      type: string
      description: "NFR category"
      required: true
      enum: ["performance", "security", "scalability", "reliability", "usability", "maintainability"]
    requirement:
      type: string
      description: "The NFR statement"
      required: true
    priority:
      type: string
      description: "Priority level"
      required: true
      enum: ["Critical", "High", "Medium", "Low"]
  example:
    - category: "performance"
      requirement: "API response time < 200ms (p95)"
      priority: "High"

# =============================================================================
# STAKEHOLDERS
# =============================================================================
# Roles, goals, and decision authority
stakeholders:
  type: array
  description: "Key stakeholders with their goals and decision authority"
  required: true
  item_schema:
    role:
      type: string
      description: "Stakeholder role or title"
      required: true
    goals:
      type: array
      description: "Stakeholder's goals for this project"
      required: true
      item_type: string
    decision_authority:
      type: array
      description: "Areas where this stakeholder has decision authority"
      required: true
      item_type: string
  example:
    - role: "Product Owner"
      goals:
        - "Maximize user adoption"
        - "Reduce churn by 20%"
      decision_authority:
        - "Feature priority"
        - "Release timing"

# =============================================================================
# SOURCE PROVENANCE
# =============================================================================
# Back-reference for audit chain: brainstorm -> requirements -> epic
source_brainstorm:
  type: string
  description: >-
    Back-reference to originating brainstorm document.
    Must match pattern BRAINSTORM-NNN or be 'N/A' if not from brainstorm.
  required: true
  pattern: "^(BRAINSTORM-\\d{3}|N/A)$"
  example: "BRAINSTORM-003"
