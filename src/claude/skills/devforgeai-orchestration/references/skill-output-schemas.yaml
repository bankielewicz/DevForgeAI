# Skill Output Schemas - DevForgeAI Framework
# STORY-301: Schema Validation for Skill Outputs
#
# Purpose: Define validation schemas for skill handoff boundaries
# (brainstorm → ideation → epic → story)
#
# Status: LOCKED
# Version: 1.0
# Last Updated: 2026-01-23

---

schemas:
  # =============================================================================
  # Brainstorm Document Schema
  # Validates output from brainstorming skill
  # Used by: spec-driven-ideation skill (input validation)
  # =============================================================================
  brainstorm:
    description: "Schema for brainstorm session documents"
    format: "Markdown with YAML frontmatter"

    required_fields:
      - "id"              # BRAINSTORM-NNN format
      - "title"           # Session title
      - "status"          # Active, Complete, Archived
      - "problem_statement"  # Core problem being addressed
      - "created"         # ISO 8601 date
      - "updated"         # ISO 8601 date

    id_pattern: "^BRAINSTORM-\\d{3,}$"

    required_sections:
      # All 7 possible sections - minimum 3 required
      - "Stakeholder Analysis"
      - "Problem Statement"
      - "Root Cause Analysis"
      - "Hypothesis Register"
      - "Impact-Effort Matrix"
      - "Solution Space"
      - "Next Steps"

    min_sections: 3  # Minimum 3 of 7 sections required

    validation_rules:
      - rule: "Document must have YAML frontmatter between --- delimiters"
      - rule: "All required_fields must be present in frontmatter"
      - rule: "id must match id_pattern regex"
      - rule: "At least min_sections (3) of required_sections must exist as ## headers"

  # =============================================================================
  # Ideation Output Schema
  # Validates output from spec-driven-ideation skill
  # Used by: architecture skill epic creation (input validation)
  # =============================================================================
  ideation:
    description: "Schema for ideation session output"
    format: "Structured output with features array"

    required_fields:
      - "features"           # Array of decomposed features
      - "total_points"       # Sum of all feature points
      - "priority_rankings"  # Prioritized feature list

    features:
      type: "array"
      min_items: 3  # Minimum 3 features required
      item_schema:
        required:
          - "name"             # Feature name
          - "description"      # Feature description
          - "estimated_points" # Story points estimate
        optional:
          - "priority"         # Priority ranking (1-5)
          - "dependencies"     # List of dependent features

    validation_rules:
      - rule: "features array must contain at least min_items (3) items"
      - rule: "Each feature must have name, description, and estimated_points"
      - rule: "total_points must equal sum of all feature estimated_points"
      - rule: "priority_rankings must include all features"

    # Error format for validation failures
    error_format:
      field_name: "Name of the field that failed validation"
      expected: "What was expected"
      actual: "What was found"
      error_message: "Human-readable error description"

  # =============================================================================
  # Epic Document Schema - RELOCATED
  # Epic schema has been moved to spec-driven-architecture skill (STORY-439)
  # See: .claude/skills/spec-driven-architecture/references/skill-output-schemas.yaml
  # =============================================================================

# =============================================================================
# Validation Status Enum
# =============================================================================
validation_status:
  enum:
    - "PASSED"   # All validations passed
    - "FAILED"   # One or more required validations failed
    - "WARN"     # Legacy document or optional validation warnings

# =============================================================================
# Schema Version and Backward Compatibility
# =============================================================================
schema_version: "1.0"
backward_compatibility:
  reference: "schema-backward-compatibility.md"
  legacy_mode: "WARN"  # Documents without format_version trigger WARN mode
