# ast-grep Configuration for DevForgeAI
# STORY-115: CLI Validator Foundation
#
# Configuration for ast-grep semantic code analysis with fallback support.

# Use grep-based fallback instead of ast-grep (default: false)
# Can be overridden per-scan with --fallback CLI flag
fallback_mode: false

# Minimum ast-grep version (inclusive)
min_version: "0.40.0"

# Maximum ast-grep version (exclusive)
max_version: "1.0.0"

# Automatically install ast-grep-cli if missing (default: false)
# When false, user will be prompted interactively
# In CI/headless mode, this setting is ignored and fallback is used
allow_auto_install: false
