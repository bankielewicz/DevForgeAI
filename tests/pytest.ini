[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=.claude/skills/devforgeai-story-creation
    --cov-report=html:.devforgeai/qa/coverage/STORY-015-coverage-report
    --cov-report=term-missing
    --cov-report=json:.devforgeai/qa/coverage/STORY-015-coverage.json
    --strict-markers
    -v
markers =
    unit: Unit tests for individual template/story operations
    integration: Integration tests for complete workflows
    e2e: End-to-end tests for real-world usage
    slow: Tests that may take >1 second
    deterministic: Tests that must pass consistently (no flaky tests)
    acceptance_criteria: Tests validating acceptance criteria from stories
    nfr: Tests validating non-functional requirements
    edge_case: Tests for edge cases and boundary conditions
    performance: Tests validating performance requirements
    reliability: Tests validating reliability requirements
    usability: Tests validating usability requirements

# Coverage thresholds for fail-on-error
[coverage:run]
branch = True
omit =
    */tests/*
    */site-packages/*

[coverage:report]
precision = 2
skip_empty = True
fail_under = 95
