[pytest]
# pytest configuration for STORY-025 test suite

# Minimum pytest version required
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --color=yes
    -v

# Markers for test categorization
markers =
    ac1: AC1 - Staging Deployment Success
    ac2: AC2 - Staging Deployment Failure
    ac3: AC3 - Production Deployment Success
    ac4: AC4 - Production Deployment Failure
    ac5: AC5 - Graceful Degradation
    ac6: AC6 - Hook Eligibility Validation
    ac7: AC7 - Consistent UX
    ac8: AC8 - Phase Integration and Ordering
    ec1: Edge Case 1 - Multiple Deployment Attempts
    ec2: Edge Case 2 - Staging Success → Production Skipped
    ec3: Edge Case 3 - Simultaneous Staging & Production Hooks
    ec4: Edge Case 4 - Hook Config Changed Mid-Deployment
    ec5: Edge Case 5 - Rollback During Production
    ec6: Edge Case 6 - Partial Deployment Success
    ac1_ideate: AC1 - Hook Eligibility Check After Ideation
    ac2_ideate: AC2 - Automatic Feedback Invocation When Eligible
    ac3_ideate: AC3 - Graceful Degradation on Hook Failures
    ac4_ideate: AC4 - Context-Aware Feedback Configuration
    ac5_ideate: AC5 - Pattern Consistency with Pilot Implementation
    story_031: STORY-031 - Wire hooks into /ideate command
    story_032: STORY-032 - Wire hooks into /create-ui command
    story_034: STORY-034 - Refactor /qa command
    story_035: STORY-035 - Internet-Sleuth Framework Compliance
    story_036: STORY-036 - Internet-Sleuth Deep Integration (Phase 2)
    acceptance_criteria: Test validates acceptance criteria
    edge_case: Test validates edge case handling
    reliability: Test validates reliability and error handling
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    regression: Regression tests
    nfr: Non-functional requirement test
    usability: Usability and UX tests
    slow: Slow running tests
    internet_sleuth: Tests for internet-sleuth agent
    business_rule: Test validates business rule enforcement

# Test timeout (30 seconds) - requires pytest-timeout plugin
# timeout = 30

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Console output
console_output_style = progress

# Test paths
testpaths =
    tests/integration

# Ignore patterns
norecursedirs =
    .git
    .devforgeai
    __pycache__
    *.egg-info
    .pytest_cache
    node_modules
